<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Vending Machine</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
html, body {
  height: 100%;
  margin: 0;
}

body {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: Arial;
  text-align: center;
}

/* Responsive image */
#machine {
  width: 80vw;
  max-width: 400px;
  cursor: pointer;
}

#menu {
  display: none;
  width: 100%;
}

/* Items */
.item {
  width: 80%;
  max-width: 400px;
  margin: 10px auto;
  padding: 15px;
  border: 1px solid black;
  cursor: pointer;
  font-size: clamp(16px, 3vw, 28px);
  transition: background-color 0.3s;
}

.clicked {
  background-color: lightgreen;
}

/* Text */
#balanceBox, #output {
  font-size: clamp(18px, 3vw, 28px);
  margin: 10px;
  font-weight: bold;
}

/* Buttons */
button {
  font-size: clamp(16px, 3vw, 26px);
  padding: 10px 20px;
  margin: 5px;
  cursor: pointer;
}

/* QR */
#qrcode {
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>QR Vending Machine</h1>

<img id="machine" src="https://i.ibb.co/JRm3wK06/Vending-Machine-Image.png">

<div id="menu">

<div id="balanceBox">Balance: $0.00</div>

<button onclick="addMoney(5)">Insert $5</button>

<h2>Select Item</h2>

<div class="item" onclick="buyItem(this, 'chips')">Chips - $1.50</div>
<div class="item" onclick="buyItem(this, 'soda')">Soda - $2.00</div>
<div class="item" onclick="buyItem(this, 'candy')">Candy - $1.25</div>

<button onclick="finish()">Done</button>

<div id="output"></div>
<div id="qrcode"></div>

</div>

<script>
class VendingMachine {
  constructor() {
    this.prices = { chips: 1.50, soda: 2.00, candy: 1.25 };
    this.balance = 0;
    this.spent = 0;
    this.purchases = [];
  }

  addMoney(amount) {
    this.balance += amount;
  }

  buy(item) {
    const price = this.prices[item];

    if (this.balance < price) {
      return false;
    }

    this.balance -= price;
    this.spent += price;
    this.purchases.push(item);
    return true;
  }
}

const vm = new VendingMachine();

function updateBalance() {
  document.getElementById("balanceBox").innerText =
    `Balance: $${vm.balance.toFixed(2)}`;
}

document.getElementById("machine").onclick = () => {
  document.getElementById("menu").style.display = "block";
  updateBalance();
};

function addMoney(amount) {
  vm.addMoney(amount);
  updateBalance();
}

function buyItem(el, item) {
  let success = vm.buy(item);

  if (!success) {
    el.style.backgroundColor = "red";
    setTimeout(() => el.style.backgroundColor = "", 300);
    document.getElementById("output").innerText = "Not enough money";
    return;
  }

  el.classList.add("clicked");
  setTimeout(() => el.classList.remove("clicked"), 200);

  document.getElementById("output").innerText = "Added: " + item;
  updateBalance();
}

function finish() {
  if (vm.purchases.length === 0) return;

  // Count items
  let counts = {};
  vm.purchases.forEach(item => {
    counts[item] = (counts[item] || 0) + 1;
  });

  const receipt = {
    counts: counts,
    totalItems: vm.purchases.length,
    balance: vm.balance.toFixed(2),
    spent: vm.spent.toFixed(2)
  };

  let encoded = btoa(JSON.stringify(receipt));

  let base = window.location.origin +
    window.location.pathname.substring(0, window.location.pathname.lastIndexOf("/") + 1);

  let finalURL = base + "receipt.html?data=" + encoded;

  document.getElementById("qrcode").innerHTML = "";

  new QRCode(document.getElementById("qrcode"), {
    text: finalURL,
    width: 200,
    height: 200
  });

  document.getElementById("output").innerText = "Scan QR to view receipt";
}
</script>

</body>
</html>
