<!DOCTYPE html>
<html>
<head>
  <title>Receipt</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
    }


    #receipt {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>
<body>


<h1>🧾 Receipt</h1>
<p>Scan result loaded successfully ✅</p>


<div id="receipt"></div>


<script>
// Get data from URL
const params = new URLSearchParams(window.location.search);
const qrData = params.get("data");


let data = null;


if (qrData) {
  data = JSON.parse(decodeURIComponent(qrData));
} else {
  data = JSON.parse(localStorage.getItem("receipt"));
}


let output = "";


if (data) {
  output += `<strong>Items Purchased:</strong><br>`;


  if (data.items.length === 0) {
    output += "No items purchased<br>";
  } else {
    data.items.forEach(item => {
      output += "- " + item + "<br>";
    });
  }


  output += `<br><strong>Total Items:</strong> ${data.totalItems}<br>`;
  output += `<strong>Remaining Balance (Change):</strong> $${data.balance}<br>`;
  output += `<strong>Total Amount Spent:</strong> $${data.spent}<br>`;
} else {
  output = "⚠️ No receipt data found.";
}


document.getElementById("receipt").innerHTML = output;
</script>


</body>
</html>
